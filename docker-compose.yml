services:
  # 1. Typesense Full-Text Search
  typesense:
    image: typesense/typesense:27.1
    container_name: liveos_search
    restart: unless-stopped
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=liveos-dev-key
    ports:
      - "8108:8108"
    volumes:
      - ./data/typesense:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8108/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Local Postgres (Replaces Supabase)
  postgres:
    image: postgres:latest
    container_name: liveos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: liveos
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432"
    volumes:
      - ./data/local_db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d liveos" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Local RustFS (S3-compatible object storage, Apache 2.0)
  rustfs:
    image: rustfs/rustfs:latest
    container_name: liveos_storage
    restart: unless-stopped
    user: "0:0"
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_UNSAFE_BYPASS_DISK_CHECK: "true"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    volumes:
      - ./data/rustfs:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: liveos_vectors
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # 5. Typesense is service #1 above
