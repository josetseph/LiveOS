services:
  # 1. Typesense Full-Text Search
  typesense:
    image: typesense/typesense:27.1
    container_name: liveos_search
    restart: unless-stopped
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=liveos-dev-key
    ports:
      - "8108:8108"
    volumes:
      - ./data/typesense:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8108/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Local Postgres (Replaces Supabase)
  postgres:
    image: postgres:latest
    container_name: liveos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: liveos
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432"
    volumes:
      - ./data/local_db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d liveos" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Local MinIO (Replaces R2)
  minio:
    image: minio/minio:latest
    container_name: liveos_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: liveos_vectors
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # 5. Typesense is service #1 above
