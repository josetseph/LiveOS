services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: liveos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: liveos
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "15432:5432"
    volumes:
      - ./data/local_db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d liveos"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Neo4j removed — graph storage is now embedded Kuzu (no container needed)

  # RustFS Object Storage (S3-compatible, Apache 2.0)
  rustfs:
    image: rustfs/rustfs:latest
    container_name: liveos-rustfs
    restart: unless-stopped
    user: "0:0"
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_UNSAFE_BYPASS_DISK_CHECK: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/rustfs:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: liveos-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # Typesense Full-Text Search
  typesense:
    image: typesense/typesense:27.1
    container_name: liveos-typesense
    restart: unless-stopped
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: liveos-dev-key
    ports:
      - "8108:8108"
    volumes:
      - ./data/typesense:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8108'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: liveos-backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8700:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      qdrant:
        condition: service_started
      typesense:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Initialization Service (one-shot — runs once, then exits)
  init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: liveos-init
    env_file: ./backend/.env

    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      qdrant:
        condition: service_started
      typesense:
        condition: service_healthy
    command: /bin/bash /app/scripts/init.sh
    volumes:
      - ./backend:/app
      - ./data:/data
    restart: "no"

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: liveos-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8700"
    ports:
      - "3700:3000"
    depends_on:
      - backend
