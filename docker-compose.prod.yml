services:
  # PostgreSQL Database
  postgres:
    image: postgres:latest
    container_name: liveos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: liveos_brain
      POSTGRES_USER: liveos
      POSTGRES_PASSWORD: liveos_password
    ports:
      - "5432:5432"
    volumes:
      - ./data/local_db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liveos"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Neo4j removed — graph storage is now embedded Kuzu (no container needed)

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: liveos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: liveos-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # Typesense Full-Text Search
  typesense:
    image: typesense/typesense:27.1
    container_name: liveos-typesense
    restart: unless-stopped
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: liveos-dev-key
    ports:
      - "8108:8108"
    volumes:
      - ./data/typesense:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8108/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: liveos-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+asyncpg://liveos:liveos_password@postgres:5432/liveos_brain"
      KUZU_DB_PATH: "/data/kuzu/kuzu_graph"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "liveos-assets"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "6333"
      TYPESENSE_HOST: "typesense"
      TYPESENSE_PORT: "8108"
      TYPESENSE_API_KEY: "liveos-dev-key"
      TYPESENSE_COLLECTION_NAME: "liveos_nodes"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
      typesense:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Initialization Service
  init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: liveos-init
    environment:
      DATABASE_URL: "postgresql+asyncpg://liveos:liveos_password@postgres:5432/liveos_brain"
      KUZU_DB_PATH: "/data/kuzu/kuzu_graph"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "liveos-assets"
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "6333"
      TYPESENSE_HOST: "typesense"
      TYPESENSE_PORT: "8108"
      TYPESENSE_API_KEY: "liveos-dev-key"
      TYPESENSE_COLLECTION_NAME: "liveos_nodes"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
      typesense:
        condition: service_healthy
    command: /bin/bash /app/scripts/init.sh
    volumes:
      - ./backend:/app
      - ./data:/data
    restart: "no"

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: liveos-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  typesense_data:
  minio_data:
